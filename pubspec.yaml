name: sayac_pro
description: "M-Bus USB OTG ile ısı ve su sayaçlarını okuma uygulaması"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # USB Seri Haberleşme için
  usb_serial: ^0.5.1

  # Durum yönetimi
  share_plus: ^12.0.2
  file_picker: ^8.1.7   
  provider: ^6.1.2
  path_provider: ^2.1.5
  excel: ^4.0.6
  audioplayers: ^6.6.0
  shared_preferences: ^2.5.5
  google_fonts: ^8.1.0
  cloud_firestore: ^6.4.1
  firebase_core: ^4.9.0
  universal_html: ^2.3.0
  flutter_secure_storage: ^10.3.1
  fl_chart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
